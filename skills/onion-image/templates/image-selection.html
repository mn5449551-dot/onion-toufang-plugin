<!DOCTYPE html>
<!--
SETS_DATA schema:
{
  "request_id": "string",
  "schemes": [{
    "id": "set1",
    "imageForm": "single | double | triple",
    "decision": "accepted | rejected | pending",
    "images": [{"index": 1, "path": "/tmp/.../set1_img1.png", "role": "base | branch"}],
    "reason": "说不清楚 | 固定规则 | 主观评价 | null",
    "ruleFeedback": "string | null",
    "note": "string | null",
    "problemPositions": [1]
  }]
}
-->
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>洋葱投放图片标注 - {{REQUEST_ID}}</title>
  <style>
    :root {
      --ink: #1a1a1a;
      --body: #333;
      --muted: #888;
      --hairline: #e5e5e5;
      --surface-soft: #f7f8fa;
      --primary: #e8835a;       /* 洋葱橙 */
      --primary-bg: #fff5ef;
      --danger: #d9534f;
      --danger-bg: #fef2f2;
      --success: #4caf50;
      --success-bg: #f0fdf4;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 0;
      background: var(--surface-soft);
      color: var(--body);
      font-size: 14px;
    }
    /* === 顶部栏 === */
    .topbar {
      background: white;
      padding: 14px 24px;
      border-bottom: 1px solid var(--hairline);
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar h1 { margin: 0; font-size: 17px; color: var(--ink); }
    .topbar .meta { color: var(--muted); font-size: 12px; }
    .topbar .progress { margin-left: auto; font-size: 13px; }
    .topbar .progress strong { color: var(--ink); }

    /* === 3 栏布局 === */
    .layout {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr) 320px;
      gap: 16px;
      padding: 16px;
      max-width: 1600px;
      margin: 0 auto;
    }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 180px minmax(0, 1fr); }
      .right-aside { grid-column: 2; }
    }

    /* === 通用面板 === */
    .panel {
      background: white;
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .panel h3 { margin: 0 0 12px 0; font-size: 14px; color: var(--ink); font-weight: 500; }

    /* === 左：方案列表 === */
    .scheme-list {
      max-height: calc(100vh - 140px);
      overflow-y: auto;
    }
    .scheme-item {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      margin-bottom: 4px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      text-align: left;
    }
    .scheme-item:hover { background: var(--surface-soft); color: var(--ink); }
    .scheme-item.active { background: var(--primary-bg); color: var(--primary); font-weight: 500; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 4px;
      background: #f0f0f0;
      color: var(--muted);
    }
    .badge.pending { background: #f0f0f0; color: var(--muted); }
    .badge.accepted { background: var(--success-bg); color: var(--success); }
    .badge.rejected { background: var(--danger-bg); color: var(--danger); }

    /* === 中：主预览 === */
    .main h3 { display: flex; align-items: center; gap: 12px; }
    .main h3 .meta-badges { margin-left: auto; display: flex; gap: 6px; }
    .images {
      display: grid;
      gap: 12px;
      margin: 16px 0;
    }
    /* 自适应 1/2/3 列（按 assets 数量动态切换 class） */
    .images.cols-1 { grid-template-columns: 1fr; max-width: 600px; margin-left: auto; margin-right: auto; }
    .images.cols-2 { grid-template-columns: 1fr 1fr; }
    .images.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    .image-cell {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .image-cell img {
      width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid var(--hairline);
      cursor: zoom-in;
      transition: transform 0.15s;
      background: white;
    }
    .image-cell img:hover { transform: scale(1.01); border-color: var(--primary); }
    .image-cell label {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .image-cell label.checked { color: var(--danger); }
    .image-cell input[type="checkbox"] { cursor: pointer; }

    /* === 来源信息（折叠） === */
    .source-box {
      margin-top: 16px;
      padding: 12px;
      background: var(--surface-soft);
      border-radius: 6px;
      font-size: 13px;
    }
    .source-box .label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    details summary { cursor: pointer; font-size: 12px; color: var(--primary); padding: 4px 0; }
    details[open] summary { color: var(--ink); }

    /* === 上一套/下一套 === */
    .nav-row {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    /* === 右：标注操作 === */
    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      border: 1px solid var(--hairline);
      cursor: pointer;
      font-size: 13px;
      background: white;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { border-color: var(--primary); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-primary:hover { background: #d97048; border-color: #d97048; }
    .btn-danger { color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: var(--danger-bg); }
    .btn-block { width: 100%; justify-content: center; }
    .btn .key {
      font-size: 11px;
      padding: 1px 6px;
      background: rgba(0,0,0,0.08);
      border-radius: 3px;
      color: inherit;
    }
    .btn-primary .key { background: rgba(255,255,255,0.25); }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      font-size: 12px;
      border: 1px solid var(--hairline);
      border-radius: 20px;
      cursor: pointer;
      color: var(--muted);
      margin: 2px;
      background: white;
    }
    .pill:hover { border-color: var(--primary); }
    .pill.active { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

    .field { margin-top: 14px; }
    .field label { display: block; font-size: 12px; color: var(--ink); margin-bottom: 6px; }
    .field textarea {
      width: 100%;
      min-height: 60px;
      padding: 8px;
      border: 1px solid var(--hairline);
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }
    .field textarea:focus { outline: none; border-color: var(--primary); }

    .hotkey-help {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--hairline);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .hotkey-help span { display: inline-flex; align-items: center; gap: 3px; }
    .hotkey-help kbd {
      background: var(--surface-soft);
      border: 1px solid var(--hairline);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: inherit;
    }

    /* === 底部提交栏 === */
    .submit-bar {
      position: sticky;
      bottom: 0;
      background: white;
      border-top: 1px solid var(--hairline);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 -1px 4px rgba(0,0,0,0.04);
    }
    .submit-bar .status { color: var(--muted); font-size: 12px; }
    .submit-bar .actions { margin-left: auto; display: flex; gap: 8px; }

    /* === 灯箱 === */
    .lightbox {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: zoom-out;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 95vw; max-height: 95vh; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🍿 洋葱投放图片标注</h1>
    <span class="meta">Request {{REQUEST_ID}}</span>
    <span class="progress">已标注 <strong id="done-count">0</strong> / <strong id="total-count">0</strong> 套</span>
  </div>

  <div class="layout">
    <!-- 左栏：方案列表 -->
    <aside class="panel scheme-list" id="scheme-list">
      <h3>方案列表</h3>
      <div id="scheme-list-items"></div>
    </aside>

    <!-- 中栏：主预览 -->
    <article class="panel main" id="main-panel">
      <!-- JS 填充 -->
    </article>

    <!-- 右栏：标注操作 -->
    <aside class="panel right-aside" id="annotation-panel">
      <h3>图片方案标注</h3>
      <p style="font-size: 12px; color: var(--muted); margin: 6px 0 14px;">
        采纳整套，或不采纳并填反馈。可勾选问题位置标注哪张有问题。
      </p>

      <div class="actions" style="display: grid; gap: 8px;">
        <button class="btn btn-primary btn-block" id="btn-accept">采纳整套 <span class="key">Y</span></button>
        <button class="btn btn-danger btn-block" id="btn-reject">不采纳整套 <span class="key">N</span></button>
      </div>

      <div id="reject-panel" style="display: none;">
        <div class="field">
          <label>反馈类型（不采纳时填）</label>
          <div>
            <span class="pill" data-reason="说不清楚">说不清楚</span>
            <span class="pill" data-reason="固定规则">固定规则</span>
            <span class="pill" data-reason="主观评价">主观评价</span>
          </div>
          <p style="font-size: 11px; color: var(--muted); margin-top: 6px;">
            <strong>固定规则</strong>：能写进 SKILL.md 的硬约束（如手机不能有刘海屏）<br>
            <strong>主观评价</strong>：说不清的吐槽 / 风格偏好
          </p>
        </div>

        <div class="field" id="field-rule" style="display: none;">
          <label>固定规则问题</label>
          <textarea id="ruleFeedback" placeholder="例：手机有刘海屏违反应用商店审核 / Logo 必须清晰"></textarea>
        </div>

        <div class="field" id="field-note" style="display: none;">
          <label>主观感受</label>
          <textarea id="note" placeholder="例：画面不够吸引人 / 风格不贴近产品"></textarea>
        </div>

        <button class="btn btn-danger btn-block" id="btn-confirm-reject" style="margin-top: 12px;">确认不采纳并下一套</button>
      </div>

      <div class="hotkey-help">
        <span><kbd>Y</kbd> / <kbd>Enter</kbd> 采纳</span>
        <span><kbd>N</kbd> 不采纳</span>
        <span><kbd>←</kbd> / <kbd>K</kbd> 上一套</span>
        <span><kbd>→</kbd> / <kbd>J</kbd> 下一套</span>
        <span><kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd> 标记图 N 有问题</span>
        <span><kbd>Esc</kbd> 清空</span>
      </div>
    </aside>
  </div>

  <div class="submit-bar">
    <span class="status" id="submit-status">把所有套都标注完后点提交</span>
    <div class="actions">
      <button class="btn" onclick="resetAll()">全部清空</button>
      <button class="btn btn-primary" onclick="submitAll()">提交标注结果</button>
    </div>
  </div>

  <div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
    <img id="lightbox-img" alt="">
  </div>

  <script>
    /**
     * SETS_DATA 由 onion-image 读取模板时替换。结构：
     * [
     *   { set_id: "set1", thumb: ["set1_img1.png", "set1_img2.png", "set1_img3.png"],
     *     meta: { channel: "应用商店", form: "三图", ratio: "3:2", ip: "豆包", style: "...", placement: "..." },
     *     source: { copyId: "C-104", copySummary: "短句1/2/3 文本", directionId: "D-007", direction: "..." } }
     * ]
     */
    let SETS = {{SETS_DATA}};
    const stateById = new Map();
    let curIndex = 0;

    function emptyState(setId) {
      return {
        id: setId,
        decision: null,        // 'accepted' | 'rejected' | null
        reason: null,          // 说不清楚 / 固定规则 / 主观评价
        ruleFeedback: '',
        note: '',
        problemPositions: [],  // [1, 2, 3] 之子集
      };
    }

    function syncStateWithSets() {
      SETS.forEach(s => {
        if (!stateById.has(s.set_id)) stateById.set(s.set_id, emptyState(s.set_id));
      });
      if (curIndex >= SETS.length) curIndex = Math.max(SETS.length - 1, 0);
    }

    function stateForIndex(index) {
      const set = SETS[index];
      if (!set) return emptyState('');
      if (!stateById.has(set.set_id)) stateById.set(set.set_id, emptyState(set.set_id));
      return stateById.get(set.set_id);
    }

    function totalCount() { return SETS.length; }

    syncStateWithSets();

    // === 渲染左栏 ===
    function renderSchemeList() {
      const html = SETS.map((s, i) => {
        const st = stateForIndex(i).decision;
        const badge = st === 'accepted' ? '<span class="badge accepted">采纳</span>' :
                       st === 'rejected' ? '<span class="badge rejected">不采纳</span>' :
                       '<span class="badge pending">待标</span>';
        return `<button class="scheme-item ${i === curIndex ? 'active' : ''}" onclick="selectIndex(${i})">
                  <span>套 ${i + 1}: ${s.set_id}</span>${badge}
                </button>`;
      }).join('');
      document.getElementById('scheme-list-items').innerHTML = html;
    }

    // === 渲染主栏 ===
    function renderMain() {
      const s = SETS[curIndex];
      if (!s) {
        document.getElementById('main-panel').innerHTML = '<h3>等待图片生成</h3><p style="color: var(--muted);">图片生成后会自动出现在这里。</p>';
        return;
      }
      const st = stateForIndex(curIndex);
      const n = s.thumb.length;
      const colClass = `cols-${Math.min(n, 3)}`;

      const metaBadges = [
        s.meta.channel, s.meta.form, s.meta.ratio,
        s.meta.ip ? `IP·${s.meta.ip}` : null,
        s.meta.placement || null,
      ].filter(Boolean).map(x => `<span class="badge">${x}</span>`).join('');

      const imagesHtml = s.thumb.map((p, idx) => {
        const i = idx + 1;
        const checked = st.problemPositions.includes(i);
        return `
          <div class="image-cell">
            <img src="${p}" alt="图 ${i}" onclick="showLightbox('${p}')">
            <label class="${checked ? 'checked' : ''}">
              <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleProblem(${i})">
              图 ${i}${checked ? ' · 标记有问题' : ''}
            </label>
          </div>`;
      }).join('');

      const sourceHtml = s.source ? `
        <section class="source-box">
          <div class="label">来源文案 · ${s.source.copyId || ''}</div>
          <p style="margin: 4px 0 0;">${s.source.copySummary || '-'}</p>
          ${s.source.direction ? `
            <details style="margin-top: 8px;">
              <summary>展开来源方向：${s.source.directionId || ''}</summary>
              <p style="margin: 6px 0 0; font-size: 12px; color: var(--muted);">${s.source.direction}</p>
            </details>` : ''}
        </section>` : '';

      const navHtml = `
        <div class="nav-row">
          <button class="btn" ${curIndex === 0 ? 'disabled' : ''} onclick="selectIndex(${curIndex - 1})">◀ 上一套 <span class="key">←</span></button>
          <button class="btn" ${curIndex >= totalCount() - 1 ? 'disabled' : ''} onclick="selectIndex(${curIndex + 1})">下一套 ▶ <span class="key">→</span></button>
        </div>`;

      document.getElementById('main-panel').innerHTML = `
        <h3>
          <span>套 ${curIndex + 1} / ${totalCount()}</span>
          <span class="meta-badges">${metaBadges}</span>
        </h3>
        <div class="images ${colClass}">${imagesHtml}</div>
        ${sourceHtml}
        ${navHtml}`;
    }

    // === 渲染右栏（采纳/拒绝面板状态）===
    function renderRightPanel() {
      const st = stateForIndex(curIndex);
      const rejectPanel = document.getElementById('reject-panel');
      // 同步 pill 选中状态
      document.querySelectorAll('.pill').forEach(p => {
        p.classList.toggle('active', p.dataset.reason === st.reason);
      });
      // 同步 textarea
      document.getElementById('ruleFeedback').value = st.ruleFeedback;
      document.getElementById('note').value = st.note;
      // 显示对应 field
      document.getElementById('field-rule').style.display =
        (st.reason === '固定规则' || (st.reason !== '说不清楚' && st.reason !== null)) ? 'block' : 'none';
      document.getElementById('field-note').style.display =
        (st.reason === '主观评价' || (st.reason !== '说不清楚' && st.reason !== null)) ? 'block' : 'none';
      // 当 decision === 'rejected' 显示 reject panel
      rejectPanel.style.display = (st.decision === 'rejected') ? 'block' : 'none';
    }

    function renderProgress() {
      const states = SETS.map((_, i) => stateForIndex(i));
      const done = states.filter(s => s.decision !== null).length;
      document.getElementById('done-count').textContent = done;
      document.getElementById('total-count').textContent = totalCount();
      const status = done === totalCount() ? '✅ 已全部标注完，可以提交' : `还有 ${totalCount() - done} 套未标注`;
      document.getElementById('submit-status').textContent = status;
    }

    function renderAll() {
      syncStateWithSets();
      renderSchemeList();
      renderMain();
      renderRightPanel();
      renderProgress();
    }

    // === 交互函数 ===
    function selectIndex(i) {
      if (i < 0 || i >= totalCount()) return;
      curIndex = i;
      renderAll();
    }
    function toggleProblem(pos) {
      const st = stateForIndex(curIndex);
      const idx = st.problemPositions.indexOf(pos);
      if (idx >= 0) st.problemPositions.splice(idx, 1);
      else st.problemPositions.push(pos);
      renderMain();
    }
    function accept() {
      const st = stateForIndex(curIndex);
      st.decision = 'accepted';
      st.reason = null;
      st.ruleFeedback = '';
      st.note = '';
      // 自动跳下一套
      const next = SETS.findIndex((_, i) => i > curIndex && stateForIndex(i).decision === null);
      if (next >= 0) selectIndex(next);
      else renderAll();
    }
    function openReject() {
      stateForIndex(curIndex).decision = 'rejected';
      renderAll();
    }
    function confirmReject() {
      const st = stateForIndex(curIndex);
      // 校验：选了"说不清楚"可以不填；否则至少一项
      if (st.reason !== '说不清楚' && !st.ruleFeedback.trim() && !st.note.trim()) {
        alert('不采纳时请至少填一项（固定规则 / 主观感受），或选「说不清楚」');
        return;
      }
      if (!st.reason) {
        alert('请先选反馈类型');
        return;
      }
      // 跳下一套
      const next = SETS.findIndex((_, i) => i > curIndex && stateForIndex(i).decision === null);
      if (next >= 0) selectIndex(next);
      else renderAll();
    }
    function setReason(r) {
      const st = stateForIndex(curIndex);
      st.reason = (st.reason === r) ? null : r;
      if (st.reason === '说不清楚') { st.ruleFeedback = ''; st.note = ''; }
      renderRightPanel();
    }
    function resetCur() {
      Object.assign(stateForIndex(curIndex), {
        decision: null, reason: null, ruleFeedback: '', note: '', problemPositions: []
      });
      renderAll();
    }
    function resetAll() {
      if (!confirm('清空所有标注？')) return;
      SETS.forEach((_, i) => Object.assign(stateForIndex(i), {
        decision: null, reason: null, ruleFeedback: '', note: '', problemPositions: []
      }));
      curIndex = 0;
      renderAll();
    }
    function showLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('show');
    }

    async function submitAll() {
      const annotated = SETS.map((scheme, i) => ({
        scheme,
        state: stateForIndex(i),
      }));
      const pending = annotated.filter(item => item.state.decision === null).length;
      if (pending > 0 && !confirm(`还有 ${pending} 套未标注，仍要提交吗？未标注将跳过，不写入 Base。`)) return;
      const accepted = annotated.filter(item => item.state.decision === 'accepted');
      const rejected = annotated.filter(item => item.state.decision === 'rejected');
      const pendingItems = annotated.filter(item => item.state.decision === null);
      const result = {
        request_id: '{{REQUEST_ID}}',
        timestamp: new Date().toISOString(),
        upload_decision: {
          upload_to_feishu: accepted.length > 0,
          accepted_count: accepted.length,
          rejected_count: rejected.length,
          pending_count: pendingItems.length,
          rule: 'Only accepted_schemes may be written to Feishu image_groups. Rejected and pending schemes must not be uploaded.',
        },
        accepted_scheme_ids: accepted.map(item => item.scheme.set_id),
        accepted_schemes: accepted.map(item => ({
          ...item.scheme,
          annotation: {
            decision: item.state.decision,
            problemPositions: item.state.problemPositions,
          },
        })),
        rejected_schemes: rejected.map(item => ({
          ...item.scheme,
          annotation: {
            decision: item.state.decision,
            reason: item.state.reason,
            ruleFeedback: item.state.ruleFeedback,
            note: item.state.note,
            problemPositions: item.state.problemPositions,
          },
        })),
        pending_scheme_ids: pendingItems.map(item => item.scheme.set_id),
        schemes: annotated.map(item => ({
          id: item.scheme.set_id,
          decision: item.state.decision || 'pending',
          ...(item.state.decision === 'rejected' ? {
            reason: item.state.reason,
            ruleFeedback: item.state.ruleFeedback,
            note: item.state.note,
          } : {}),
          problemPositions: item.state.problemPositions,
        })),
      };
      const json = JSON.stringify(result, null, 2);
      try {
        const response = await fetch('/api/image-selection', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: json,
        });
        const payload = await response.json();
        if (payload.ok) {
          document.getElementById('submit-status').textContent = `已保存：${payload.path}`;
          alert('✅ 标注结果已保存，请回到当前 AI 对话继续。');
          return;
        }
      } catch (err) {
        // file:// or plain static server fallback.
      }
      navigator.clipboard.writeText(json).then(() => {
        alert('✅ 标注结果已复制到剪贴板。\n请回到当前 AI 对话粘贴。');
      }).catch(() => {
        prompt('复制下面的 JSON 粘贴回 Claude Code：', json);
      });
    }

    function mergeIncomingSets(incoming) {
      if (!Array.isArray(incoming)) return false;
      const current = new Map(SETS.map(s => [s.set_id, s]));
      let changed = false;
      incoming.forEach(item => {
        if (!item || !item.set_id) return;
        const prior = current.get(item.set_id);
        if (!prior || JSON.stringify(prior) !== JSON.stringify(item)) {
          current.set(item.set_id, item);
          changed = true;
        }
      });
      if (!changed) return false;
      const knownOrder = SETS.map(s => s.set_id);
      const newIds = incoming.map(s => s.set_id).filter(id => !knownOrder.includes(id));
      SETS = [...knownOrder, ...newIds].map(id => current.get(id)).filter(Boolean);
      syncStateWithSets();
      return true;
    }

    async function pollImageSets() {
      try {
        const response = await fetch('/api/image-sets', { cache: 'no-store' });
        if (!response.ok) return;
        const payload = await response.json();
        if (mergeIncomingSets(payload.sets)) {
          renderAll();
        }
      } catch (err) {
        // file:// or plain static server fallback.
      }
    }

    // === 快捷键 ===
    document.addEventListener('keydown', (e) => {
      // textarea 内不响应字母快捷键（避免输入冲突）
      if (e.target.tagName === 'TEXTAREA') return;
      const key = e.key;
      if (key === 'ArrowLeft' || key === 'k' || key === 'K') { selectIndex(curIndex - 1); e.preventDefault(); }
      else if (key === 'ArrowRight' || key === 'j' || key === 'J') { selectIndex(curIndex + 1); e.preventDefault(); }
      else if (key === 'y' || key === 'Y' || key === 'Enter') { accept(); e.preventDefault(); }
      else if (key === 'n' || key === 'N') { openReject(); e.preventDefault(); }
      else if (key === 'Escape') { resetCur(); e.preventDefault(); }
      else if (key >= '1' && key <= '3') {
        const n = parseInt(key);
        if (SETS[curIndex] && n <= SETS[curIndex].thumb.length) { toggleProblem(n); e.preventDefault(); }
      }
    });

    // pill 点击
    document.querySelectorAll('.pill').forEach(p => {
      p.addEventListener('click', () => setReason(p.dataset.reason));
    });
    // textarea 同步
    document.getElementById('ruleFeedback').addEventListener('input', e => {
      stateForIndex(curIndex).ruleFeedback = e.target.value;
    });
    document.getElementById('note').addEventListener('input', e => {
      stateForIndex(curIndex).note = e.target.value;
    });
    document.getElementById('btn-accept').addEventListener('click', accept);
    document.getElementById('btn-reject').addEventListener('click', openReject);
    document.getElementById('btn-confirm-reject').addEventListener('click', confirmReject);

    // 初始渲染
    renderAll();
    setInterval(pollImageSets, 2500);
  </script>
</body>
</html>
